{% extends "base.html" %}

{% block title %}Register - My Website{% endblock %}

{% block content %}
<div class="auth-container">
    <form class="auth-form" method="POST">
        <h2>Create Account</h2>
        
        {% if errors %}
            {% for error in errors %}
                <div class="alert alert-error">{{ error }}</div>
            {% endfor %}
        {% endif %}

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username" minlength="3">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6">
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password" minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Register</button>

        <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </form>
</div>
{% endblock %}
