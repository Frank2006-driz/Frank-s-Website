{% extends "base.html" %}

{% block title %}Edit Post - My Website{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Post</h2>

    {% if errors %}
        {% for error in errors %}
            <div class="alert alert-error">{{ error }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="post-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required value="{{ post.title }}" minlength="5">
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id">
                <option value="">-- Select a category --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if post.category and post.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required rows="10" minlength="20">{{ post.content }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Post</button>
            <a href="{{ url_for('view_post', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
