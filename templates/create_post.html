{% extends "base.html" %}

{% block title %}Create Post - My Website{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create New Post</h2>

    {% if errors %}
        {% for error in errors %}
            <div class="alert alert-error">{{ error }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="post-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required placeholder="Enter post title" minlength="5">
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id">
                <option value="">-- Select a category --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required placeholder="Write your post content here..." rows="10" minlength="20"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish Post</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
