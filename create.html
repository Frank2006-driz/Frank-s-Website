<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Click Game</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #game { border: 3px solid #444; background: #000; }
    #hud { position: absolute; top: 16px; left: 16px; }
    #message { position: absolute; top: 16px; right: 16px; }
  </style>
</head>
<body>
  <div id="hud">Score: <span id="score">0</span></div>
  <div id="message">Click the circle!</div>
  <canvas id="game" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    let score = 0;
    let circle = { x: 300, y: 200, radius: 30, speedX: 3, speedY: 2 };
    let lastTime = 0;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1e90ff';
      ctx.beginPath();
      ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText('Click the moving circle!', 12, 24);
    }

    function update(delta) {
      circle.x += circle.speedX * delta;
      circle.y += circle.speedY * delta;

      if (circle.x - circle.radius < 0 || circle.x + circle.radius > canvas.width) {
        circle.speedX *= -1;
      }
      if (circle.y - circle.radius < 0 || circle.y + circle.radius > canvas.height) {
        circle.speedY *= -1;
      }
    }

    function loop(timestamp) {
      const delta = Math.min((timestamp - lastTime) / 16.67, 2);
      lastTime = timestamp;
      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('click', function(event) {
      const rect = canvas.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;
      const dx = clickX - circle.x;
      const dy = clickY - circle.y;
      if (Math.sqrt(dx * dx + dy * dy) <= circle.radius) {
        score += 1;
        scoreEl.textContent = score;
        messageEl.textContent = 'Nice! Keep going!';
        circle.speedX *= 1.05;
        circle.speedY *= 1.05;
        circle.radius = Math.max(15, circle.radius - 1);
      }
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
