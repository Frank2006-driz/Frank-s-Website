{% extends "base.html" %}

{% block title %}Access Denied - My Website{% endblock %}

{% block content %}
<div class="error-page">
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p>You don't have permission to access this resource.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Home</a>
</div>

<style>
.error-page {
    text-align: center;
    padding: 3rem 0;
}

.error-page h1 {
    font-size: 4rem;
    color: var(--danger-color);
    margin-bottom: 0.5rem;
}

.error-page h2 {
    margin-bottom: 1rem;
}

.error-page p {
    margin-bottom: 1.5rem;
    color: var(--secondary-color);
}
</style>
{% endblock %}
